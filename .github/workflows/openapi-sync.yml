name: OpenAPI Sync

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-openapi-generated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify generated OpenAPI artifacts are up to date
        run: ./scripts/check_openapi_generated.sh
