name: integration-contract-tests

on:
  pull_request:
    paths:
      - 'cmd/server/**'
      - 'internal/**'
      - 'parser-node/**'
      - '.github/workflows/integration-contract-tests.yml'
  push:
    branches: [ main ]
    paths:
      - 'cmd/server/**'
      - 'internal/**'
      - 'parser-node/**'
      - '.github/workflows/integration-contract-tests.yml'

jobs:
  contract-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Contract integration suite (stable timing budget)
        env:
          PARSER_CONCURRENCY_LIMIT: '1'
        run: |
          go test ./cmd/server -run '^TestServerContractIntegration_' -count=1 -timeout=90s
