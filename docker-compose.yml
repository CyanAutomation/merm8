version: "3.9"

services:
  mermaid-lint:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      PARSER_SCRIPT: "/app/parser-node/parse.mjs"
      MERM8_API_URL: "http://localhost:8080"
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
    restart: unless-stopped
