openapi: 3.0.0
info:
  title: merm8 - Mermaid Lint API
  description: |
    A deterministic Mermaid static analysis engine that validates and lints Mermaid diagrams.
    
    - Accepts Mermaid code via HTTP POST
    - Validates syntax using the official Mermaid parser
    - Returns structured syntax errors if invalid
    - Runs deterministic lint rules on valid diagrams
    - Returns structured lint results with metrics
  version: 1.0.0
  contact:
    name: merm8 Project
    url: https://github.com/CyanAutomation/merm8
  license:
    name: License
    url: https://github.com/CyanAutomation/merm8/blob/main/LICENSE

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.example.com
    description: Production server (replace with actual URL)

tags:
  - name: Linting
    description: Mermaid diagram analysis and linting
  - name: Documentation
    description: API documentation and specification
  - name: Probes
    description: Liveness and readiness probe endpoints

paths:
  /healthz:
    get:
      tags:
        - Probes
      summary: Liveness probe
      description: Returns process liveness status.
      operationId: getHealthz
      responses:
        '200':
          description: Process is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /ready:
    get:
      tags:
        - Probes
      summary: Readiness probe
      description: Returns readiness status, including parser dependency checks when available.
      operationId: getReady
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: not_ready
                  error:
                    type: string

  /analyze:
    post:
      tags:
        - Linting
      summary: Analyze and lint a Mermaid diagram
      description: |
        Validates Mermaid code syntax and runs deterministic lint rules.

        Maximum request body size is 1 MiB. Oversized payloads return HTTP 413.
        
        Supported lint families: flowchart/graph.

        Sequence/class/ER/state diagrams are parsed and reported with `lint_supported=false` and an informational `unsupported-diagram-type` issue until family-specific rule sets are rolled out.

        Returns syntax errors if parsing fails, or lint results if parsing succeeds.
      operationId: analyzeCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
            examples:
              simple:
                summary: Simple graph
                value:
                  code: |
                    graph TD
                      A[Start] --> B[End]
              withConfig:
                summary: With lint configuration
                value:
                  code: |
                    graph LR
                      A --> B
                      B --> C
                  config:
                    rules:
                      max-fanout:
                        enabled: true
                        limit: 2
                        severity: error
                        suppression_selectors:
                          - node:A
              syntaxError:
                summary: Invalid Mermaid syntax
                value:
                  code: "graph TD\n  A --> B -->"
      responses:
        '200':
          description: Analysis completed (valid or syntax error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponse'
              examples:
                validDiagram:
                  summary: Valid diagram with no issues
                  value:
                    valid: true
                    diagram_type: flowchart
                    lint_supported: true
                    syntax_error: null
                    issues: []
                    metrics:
                      node_count: 2
                      edge_count: 1
                      disconnected_node_count: 0
                      duplicate_node_count: 0
                      max_fanin: 1
                      max_fanout: 1
                      diagram_type: flowchart
                      direction: TD
                      issue_counts:
                        by_severity: {}
                        by_rule: {}
                syntaxError:
                  summary: Syntax error response
                  value:
                    valid: false
                    lint_supported: false
                    syntax_error:
                      message: "Unexpected token '>'"
                      line: 2
                      column: 12
                    issues: []
                withIssues:
                  summary: Valid diagram with lint issues
                  value:
                    valid: true
                    diagram_type: flowchart
                    lint_supported: true
                    syntax_error: null
                    issues:
                      - rule_id: no-disconnected-nodes
                        severity: error
                        message: Node 'D' is not connected to the graph
                      - rule_id: max-fanout
                        severity: warn
                        message: Node 'A' has fanout 6, exceeding limit of 5
                        line: 2
                        column: 2
                    metrics:
                      node_count: 4
                      edge_count: 2
                      disconnected_node_count: 1
                      duplicate_node_count: 0
                      max_fanin: 1
                      max_fanout: 2
                      diagram_type: flowchart
                      direction: TD
                      issue_counts:
                        by_severity:
                          error: 1
                          warn: 1
                        by_rule:
                          no-disconnected-nodes: 1
                          max-fanout: 1
        '400':
          description: Bad request (invalid JSON or missing required field)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missingCode:
                  summary: Missing 'code' field
                  value:
                    valid: false
                    issues: []
                    error:
                      code: missing_code
                      message: "field 'code' is required"
                invalidJSON:
                  summary: Invalid JSON body
                  value:
                    valid: false
                    issues: []
                    error:
                      code: invalid_json
                      message: "invalid JSON body"
                invalidConfig:
                  summary: Invalid lint configuration
                  value:
                    valid: false
                    issues: []
                    error:
                      code: invalid_config
                      message: "unknown rule id \"unknown-rule\" in config"
        '413':
          description: Request entity too large (body exceeds 1 MiB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                valid: false
                issues: []
                error:
                  code: request_too_large
                  message: request body exceeds 1 MiB limit
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                parserTimeout:
                  summary: Parser timeout
                  value:
                    valid: false
                    issues: []
                    error:
                      code: parser_timeout
                      message: parser timed out
                internal:
                  summary: Generic internal failure
                  value:
                    valid: false
                    issues: []
                    error:
                      code: internal_error
                      message: internal server error

  /spec:
    get:
      tags:
        - Documentation
      summary: Get OpenAPI specification
      description: Returns the OpenAPI 3.0 specification for this API in JSON format
      operationId: getSpec
      responses:
        '200':
          description: OpenAPI specification
          content:
            application/json:
              schema:
                type: object

  /docs:
    get:
      tags:
        - Documentation
      summary: Interactive API documentation
      description: Serve Swagger UI for interactive API exploration and testing
      operationId: getDocs
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string

components:
  schemas:
    AnalyzeRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: Mermaid diagram code to analyze. Total request body must be 1 MiB or smaller.
          example: |
            graph TD
              A[Start] --> B[Process]
              B --> C[End]
        config:
          type: object
          description: |
            Optional lint rule configuration. Supports both flat and nested formats:
            - Flat format: `{"rule-id": {"option": "value"}}`
            - Nested format: `{"rules": {"rule-id": {"option": "value"}}}`
            Unknown rule IDs are rejected with `400 invalid_config`.
          example:
            max-fanout:
              enabled: true
              limit: 3
              severity: error
              suppression_selectors:
                - node:A
            no-disconnected-nodes:
              enabled: false
              severity: info

    ErrorResponse:
      type: object
      required:
        - valid
        - lint_supported
        - issues
        - error
      properties:
        valid:
          type: boolean
          description: Always false for non-200 responses
        issues:
          type: array
          description: Always empty for API-level errors
          items:
            $ref: '#/components/schemas/Issue'
        error:
          $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: invalid_json
        message:
          type: string
          description: Human-readable error message
          example: invalid JSON body

    AnalyzeResponse:
      type: object
      required:
        - valid
        - lint_supported
        - issues
      properties:
        valid:
          type: boolean
          description: Whether the Mermaid code is syntactically valid
        diagram_type:
          type: string
          description: Normalized Mermaid diagram type (flowchart, sequence, class, er, state, unknown).
          example: flowchart
        lint_supported:
          type: boolean
          description: Whether lint rules are currently implemented for the parsed diagram type.
        syntax_error:
          $ref: '#/components/schemas/SyntaxError'
          description: Syntax error details if `valid` is false. Null if valid.
          nullable: true
        issues:
          type: array
          description: Lint rule violations found in the diagram
          items:
            $ref: '#/components/schemas/Issue'
        metrics:
          $ref: '#/components/schemas/Metrics'
          description: Aggregate statistics about the diagram. Present if valid.
          nullable: true

    SyntaxError:
      type: object
      required:
        - message
        - line
        - column
      properties:
        message:
          type: string
          description: Error message from the Mermaid parser
          example: "Unexpected token '>'"
        line:
          type: integer
          description: 1-based line number where the error occurred
          example: 2
        column:
          type: integer
          description: 0-based column number where the error occurred
          example: 12

    Issue:
      type: object
      required:
        - rule_id
        - severity
        - message
      properties:
        rule_id:
          type: string
          description: Identifier of the lint rule that triggered
          example: no-disconnected-nodes
        severity:
          type: string
          enum:
            - error
            - warn
            - info
          description: Severity level of the issue
        message:
          type: string
          description: Human-readable description of the issue
          example: Node 'isolated' is not connected to the graph
        line:
          type: integer
          description: 1-based line number where issue is located when known. Omitted when unknown.
          example: 5
          nullable: true
        column:
          type: integer
          description: 0-based column number where issue is located when known. Omitted when unknown.
          example: 2
          nullable: true

    Metrics:
      type: object
      required:
        - node_count
        - edge_count
        - disconnected_node_count
        - duplicate_node_count
        - max_fanin
        - max_fanout
        - diagram_type
      properties:
        node_count:
          type: integer
          description: Total number of nodes in the diagram
          example: 5
        edge_count:
          type: integer
          description: Total number of edges (connections) in the diagram
          example: 4
        disconnected_node_count:
          type: integer
          description: Number of nodes with neither incoming nor outgoing edges
          example: 1
        duplicate_node_count:
          type: integer
          description: Number of duplicate node declarations beyond first occurrences
          example: 0
        max_fanin:
          type: integer
          description: Maximum number of incoming edges to any single node
          example: 3
        max_fanout:
          type: integer
          description: Maximum number of outgoing edges from any single node
          example: 2
        diagram_type:
          type: string
          description: Diagram type copied from parsed metadata
          example: flowchart
        direction:
          type: string
          description: Diagram direction when provided by parser
          example: TD
        issue_counts:
          $ref: '#/components/schemas/IssueCounts'
          description: Issue count aggregations by severity and rule ID

    IssueCounts:
      type: object
      required:
        - by_severity
        - by_rule
      properties:
        by_severity:
          type: object
          additionalProperties:
            type: integer
        by_rule:
          type: object
          additionalProperties:
            type: integer
