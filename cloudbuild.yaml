# Google Cloud Build — merm8
#
# Purpose: Builds and deploys a demo instance to Google Cloud Run.
#          This is NOT the production image — real users pull from GHCR/DockerHub.
#
# Trigger: Manual (configure trigger in GCP Console → Cloud Build → Triggers)
# Platform: linux/amd64 (Cloud Run is amd64-only; no QEMU/Buildx needed)
# Registry: Google Artifact Registry (GAR)
#
# Pre-requisite: GAR repository must exist before running this build (one-time setup):
#   gcloud artifacts repositories create merm8 \
#     --repository-format=docker \
#     --location=europe-west1 \
#     --description="merm8 demo images"
#
# Required substitutions (override in GCP trigger or --substitutions flag):
#   _GAR_REGION      : Artifact Registry region       (e.g. europe-west1)
#   _GAR_REPO        : Artifact Registry repository   (e.g. merm8)
#   _IMAGE_NAME      : Image name                     (default: merm8)
#   _IMAGE_TAG       : Primary image tag              (default: latest)
#   _CLOUD_RUN_REGION: Cloud Run deployment region    (e.g. europe-west1)
#   _SERVICE_NAME    : Cloud Run service name         (default: merm8-api)
#   _SERVICE_PORT    : Cloud Run container port        (default: 8080)
#
# Usage (manual via gcloud):
#   gcloud builds submit \
#     --config cloudbuild.yaml \
#     --substitutions _GAR_REGION=europe-west1,_GAR_REPO=merm8,_IMAGE_TAG=latest,_SERVICE_PORT=8080 \
#     .

substitutions:
  _GAR_REGION: europe-west1
  _GAR_REPO: merm8
  _IMAGE_NAME: merm8
  _IMAGE_TAG: latest
  _CLOUD_RUN_REGION: europe-west1
  _SERVICE_NAME: merm8-api
  _SERVICE_PORT: "8080"

steps:
  - name: gcr.io/cloud-builders/gcloud
    id: check-doc-identifiers
    entrypoint: bash
    args:
      - -c
      - |
        apt-get update && apt-get install -y ripgrep
        ./scripts/check-doc-identifiers.sh

  # ---- Step 1: Build image ----
  # Plain docker build with BuildKit enabled — no Buildx or QEMU needed.
  # Cloud Run only runs linux/amd64, so cross-compilation is unnecessary here.
  - name: gcr.io/cloud-builders/docker
    id: build-and-push
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --platform
      - linux/amd64
      - --tag
      - ${_GAR_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPO}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --tag
      - ${_GAR_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPO}/${_IMAGE_NAME}:$SHORT_SHA
      - .

  # ---- Step 2: Push image to GAR ----
  - name: gcr.io/cloud-builders/docker
    id: push-image
    args:
      - push
      - --all-tags
      - ${_GAR_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPO}/${_IMAGE_NAME}
    waitFor:
      - check-doc-identifiers
      - build-and-push

  # ---- Step 3: Deploy to Cloud Run (demo) ----
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-cloud-run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_GAR_REGION}-docker.pkg.dev/$PROJECT_ID/${_GAR_REPO}/${_IMAGE_NAME}:${_IMAGE_TAG}
      - --region
      - ${_CLOUD_RUN_REGION}
      - --platform
      - managed
      - --port
      - ${_SERVICE_PORT}
      - --allow-unauthenticated
    waitFor:
      - push-image

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
